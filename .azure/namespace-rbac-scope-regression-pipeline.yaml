# Pipeline for running regression tests with namespace RBAC scope enabled
# This pipeline tests the operator behavior when RBAC is scoped to namespaces
# rather than cluster-wide permissions.

trigger: none

pr: none

parameters:
  - name: BUILD_REASON
    displayName: Build Reason
    type: string
    default: PullRequest
  - name: TEST_PROFILE
    displayName: Test Profile
    type: string
    default: regression
  - name: CLUSTERS_PREFIX
    displayName: Clusters Prefix
    type: string
    default: strimzi
  - name: CLUSTER_OPERATOR_INSTALL_TYPE
    displayName: Cluster Operator Install Type
    type: string
    default: bundle

extends:
  template: pipeline-templates/general-pipeline.yaml
  parameters:
    BUILD_REASON: ${{ parameters.BUILD_REASON }}
    TEST_PROFILE: ${{ parameters.TEST_PROFILE }}
    CLUSTERS_PREFIX: ${{ parameters.CLUSTERS_PREFIX }}
    CLUSTER_OPERATOR_INSTALL_TYPE: ${{ parameters.CLUSTER_OPERATOR_INSTALL_TYPE }}
    NAMESPACE_RBAC_SCOPE: true

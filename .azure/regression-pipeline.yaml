# Regression pipeline for strimzi-kafka-operator
# Runs the full regression test suite against the Kafka operator

trigger: none

pr: none

schedules:
  - cron: "0 2 * * *"
    displayName: Nightly regression run
    branches:
      include:
        - main
    always: true

parameters:
  - name: TEST_PROFILE
    displayName: Test profile to run
    type: string
    default: regression
    values:
      - regression
      - smoke
      - full

resources:
  repositories:
    - repository: self
      trigger: none

variables:
  - template: /azure/templates/default-variables.yaml
    parameters:
      BUILD_REASON: $(Build.Reason)

extends:
  template: /azure/templates/system-tests.yaml
  parameters:
    TEST_PROFILE: ${{ parameters.TEST_PROFILE }}
    CLUSTER_OPERATOR_INSTALL_TYPE: bundle
